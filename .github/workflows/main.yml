name: Serverless API CI/CD Pipeline

# This tells GitHub to run this script every time you push to the 'main' branch
on:
  push:
    branches: [ main ]

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest # This creates a fresh, temporary Linux computer in the cloud

    steps:
      # 1. Download your code onto the temporary cloud computer
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # 2. Install Python so AWS SAM can run
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install Node.js so Playwright can run
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 4. Log in to AWS using the secrets you will put in GitHub
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 5. Build your Python code into an AWS package
      - name: SAM Build
        run: sam build

      # 6. Deploy that package to your AWS account
      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name sdet-api-project \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      # 7. Install Playwright and its test browsers
      - name: Install Playwright Dependencies
        run: |
          npm ci
          npx playwright install --with-deps

      # 8. Run your UI and API tests against the newly deployed code!
      - name: Run E2E Tests
        run: npx playwright test

      # 9. If tests fail, save the Playwright report so you can download and view it
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7